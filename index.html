<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StreamAAC</title>
<link rel="stylesheet" href="styles.css">
<script src="chat-core.js" defer></script>
</head>
<body>

<!-- ═══════════════ SETUP PAGE ═══════════════ -->
<div id="compact-view">

  <header>
    <div class="logo">StreamAAC</div>
    <div class="status-dot" id="status-dot"></div>
    <div class="status-label" id="status-label">not connected</div>
    <button class="hbtn" id="voice-btn" onclick="openVoiceModal()">voice</button>
    <button class="hbtn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode">☀</button>
  </header>

  <div id="setup-panel">
    <div id="setup-inner">
      <div class="row">
        <input type="text" id="channel-input" placeholder="twitch channel" autocapitalize="none" autocorrect="off" spellcheck="false"/>
        <button class="btn-connect" id="connect-btn" onclick="toggleConnect()">connect</button>
      </div>
      <div class="row">
        <label for="handle-input">your handle</label>
        <input type="text" id="handle-input" placeholder="your twitch username" autocapitalize="none" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="row">
        <label for="persona-input">persona</label>
        <input type="text" id="persona-input" placeholder="e.g. chill FPS streamer, sarcastic"/>
      </div>
      <div class="row">
        <label for="ctx-input">context</label>
        <input type="text" id="ctx-input" placeholder="e.g. just got a 10 kill streak"/>
      </div>
      <div class="row">
        <label for="bots-input">ignore bots</label>
        <input type="text" id="bots-input" placeholder="e.g. Nightbot, StreamElements" autocapitalize="none" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="row">
        <label for="game-select">game</label>
        <select id="game-select">
          <option value="">— not specified —</option>
          <option value="Just Chatting">Just Chatting</option>
          <option value="Animal Crossing">Animal Crossing</option>
          <option value="Apex Legends">Apex Legends</option>
          <option value="Fortnite">Fortnite</option>
          <option value="Grand Theft Auto V">Grand Theft Auto V</option>
          <option value="House Flipper">House Flipper</option>
          <option value="League of Legends">League of Legends</option>
          <option value="Minecraft">Minecraft</option>
          <option value="PowerWash Simulator 2">PowerWash Simulator 2</option>
          <option value="Valorant">Valorant</option>
          <option value="other">Other…</option>
        </select>
        <input type="text" id="game-custom-input" placeholder="game name"
               style="display:none" autocorrect="off" spellcheck="false"/>
      </div>
    </div>
  </div>

  <!-- ═══════════════ VOICE MODAL ═══════════════ -->
  <div class="modal-overlay" id="voice-modal" onclick="handleModalClick(event)">
    <div class="modal-dialog">
      <div class="modal-header">
        <span class="modal-title">voice settings</span>
        <button class="modal-close" onclick="closeVoiceModal()">✕</button>
      </div>

      <div class="voice-row">
        <label for="lang-select">language</label>
        <select id="lang-select" onchange="saveLangChoice()">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="nl">Dutch</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese</option>
        </select>
      </div>

      <div class="voice-row">
        <label>voice source</label>
        <div class="source-pills">
          <button class="spill active" data-src="browser" onclick="setVoiceSource(this)">browser</button>
          <button class="spill" data-src="elevenlabs" onclick="setVoiceSource(this)">ElevenLabs</button>
        </div>
      </div>

      <hr class="modal-divider">

      <div id="browser-section">
        <div class="modal-subsection-label">browser voice</div>
        <div class="voice-row">
          <label for="browser-voice-select">voice</label>
          <select id="browser-voice-select" onchange="saveBrowserVoice()">
            <option value="">— system default —</option>
          </select>
        </div>
      </div>

      <div id="el-section" style="display:none">
        <div class="modal-subsection-label">ElevenLabs</div>
        <div class="voice-row">
          <label for="el-key-input">API key</label>
          <input type="password" id="el-key-input" placeholder="sk-… (optional)" autocomplete="off"/>
          <button class="btn-load" id="load-voices-btn" onclick="loadVoices()">load voices</button>
        </div>
        <div class="voice-row" id="gender-row" style="display:none">
          <label>filter</label>
          <div class="gender-pills">
            <button class="gpill active" data-g="all" onclick="filterVoices(this)">all</button>
            <button class="gpill" data-g="female" onclick="filterVoices(this)">female</button>
            <button class="gpill" data-g="male" onclick="filterVoices(this)">male</button>
          </div>
        </div>
        <div class="voice-row" id="voice-select-row" style="display:none">
          <label for="voice-select">voice</label>
          <select id="voice-select" onchange="saveVoiceChoice()">
            <option value="">— select a voice —</option>
          </select>
        </div>
        <div class="voice-status" id="voice-status">enter your API key and click load voices</div>
      </div>

    </div>
  </div>

  <div id="chat-panel">
    <div id="chat-area">
      <div class="empty-state" id="empty-msg">connect to see chat</div>
    </div>
  </div>

  <div id="gen-bar">
    <button class="btn-gen" id="gen-btn" onclick="startGenerating()">start generating</button>
  </div>

  <div id="responses-area">
  </div>

</div>

<script>
// ── STATE ──
let ws = null, chatLog = [], isConnected = false;
let theme = localStorage.getItem('theme') || 'dark';
const MAX_MSG = 40;

// ── ELEVENLABS STATE ──
let elVoices = [];
let elGenderFilter = 'all';

// ── THEME ──
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀' : '☾';
}

// ── LOCALSTORAGE: load saved values on startup ──
window.addEventListener('DOMContentLoaded', () => {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀' : '☾';

  const savedChannel = localStorage.getItem('twitch_channel');
  const savedHandle  = localStorage.getItem('twitch_handle');
  const savedPersona = localStorage.getItem('persona');
  const savedCtx     = localStorage.getItem('context');

  if (savedChannel) document.getElementById('channel-input').value = savedChannel;
  if (savedHandle)  document.getElementById('handle-input').value  = savedHandle;
  if (savedPersona) document.getElementById('persona-input').value = savedPersona;
  if (savedCtx)     document.getElementById('ctx-input').value     = savedCtx;

  // Save on change
  document.getElementById('channel-input').addEventListener('change', () =>
    localStorage.setItem('twitch_channel', document.getElementById('channel-input').value.trim()));
  document.getElementById('handle-input').addEventListener('change', () =>
    localStorage.setItem('twitch_handle', document.getElementById('handle-input').value.trim()));
  document.getElementById('persona-input').addEventListener('change', () =>
    localStorage.setItem('persona', document.getElementById('persona-input').value.trim()));
  document.getElementById('ctx-input').addEventListener('change', () =>
    localStorage.setItem('context', document.getElementById('ctx-input').value.trim()));

  const savedBots = localStorage.getItem('ignored_bots');
  if (savedBots) document.getElementById('bots-input').value = savedBots;
  document.getElementById('bots-input').addEventListener('change', () => {
    localStorage.setItem('ignored_bots', document.getElementById('bots-input').value.trim());
    invalidateBotCache();
  });

  // Game select
  const savedGame = localStorage.getItem('game') || '';
  if (savedGame) document.getElementById('game-select').value = savedGame;
  if (savedGame === 'other') {
    document.getElementById('game-custom-input').style.display = '';
    const savedCustom = localStorage.getItem('game_custom') || '';
    if (savedCustom) document.getElementById('game-custom-input').value = savedCustom;
  }
  document.getElementById('game-select').addEventListener('change', () => {
    const val = document.getElementById('game-select').value;
    localStorage.setItem('game', val);
    document.getElementById('game-custom-input').style.display = val === 'other' ? '' : 'none';
  });
  document.getElementById('game-custom-input').addEventListener('change', () => {
    localStorage.setItem('game_custom', document.getElementById('game-custom-input').value.trim());
  });

  // Load saved ElevenLabs key
  const savedElKey = localStorage.getItem('el_key');
  if (savedElKey) document.getElementById('el-key-input').value = savedElKey;
  document.getElementById('el-key-input').addEventListener('input', () => {
    localStorage.setItem('el_key', document.getElementById('el-key-input').value.trim());
  });
  document.getElementById('el-key-input').addEventListener('blur', () => {
    if (document.getElementById('el-key-input').value.trim()) loadVoices();
  });

  // Restore saved EL voice data if key is present
  const savedElVoices = localStorage.getItem('el_voices');
  if (savedElKey && savedElVoices) {
    try {
      elVoices = JSON.parse(savedElVoices);
      const savedGender = localStorage.getItem('el_gender') || 'all';
      elGenderFilter = savedGender;
      document.querySelectorAll('.gpill').forEach(p =>
        p.classList.toggle('active', p.dataset.g === savedGender));
      renderElVoices(localStorage.getItem('el_voice_id') || '');
      setVoiceStatus(`${elVoices.length} voices loaded`, 'ok');
    } catch(e) { /* ignore stale data */ }
  }

  // Language selector
  const savedLang = localStorage.getItem('voice_lang') || 'en';
  document.getElementById('lang-select').value = savedLang;

  // Voice source
  const savedSrc = localStorage.getItem('voice_source') || 'browser';
  document.querySelectorAll('.spill').forEach(p =>
    p.classList.toggle('active', p.dataset.src === savedSrc));
  document.getElementById('browser-section').style.display = savedSrc === 'browser' ? 'block' : 'none';
  document.getElementById('el-section').style.display = savedSrc === 'elevenlabs' ? 'block' : 'none';

  // Browser TTS voices
  populateBrowserVoices();
  window.speechSynthesis.onvoiceschanged = populateBrowserVoices;

  // Escape closes voice modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeVoiceModal(); });
});

// ── VOICE MODAL ──
function openVoiceModal() {
  document.getElementById('voice-modal').classList.add('open');
}
function closeVoiceModal() {
  document.getElementById('voice-modal').classList.remove('open');
}
function handleModalClick(e) {
  if (e.target === document.getElementById('voice-modal')) closeVoiceModal();
}
function setVoiceSource(btn) {
  document.querySelectorAll('.spill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const src = btn.dataset.src;
  localStorage.setItem('voice_source', src);
  document.getElementById('browser-section').style.display = src === 'browser' ? 'block' : 'none';
  document.getElementById('el-section').style.display = src === 'elevenlabs' ? 'block' : 'none';
}

// ── VOICE SETTINGS ──
function setVoiceStatus(msg, cls='') {
  const el = document.getElementById('voice-status');
  el.textContent = msg;
  el.className = 'voice-status' + (cls ? ' '+cls : '');
}

async function loadVoices() {
  const key = document.getElementById('el-key-input').value.trim();
  if (!key) { setVoiceStatus('enter your ElevenLabs API key first', 'err'); return; }
  const btn = document.getElementById('load-voices-btn');
  btn.disabled = true; btn.textContent = 'loading…';
  setVoiceStatus('fetching voices…');
  try {
    const r = await fetch('https://api.elevenlabs.io/v1/voices', {
      headers: { 'xi-api-key': key }
    });
    if (!r.ok) {
      if (r.status === 401) throw new Error('invalid API key — check it in your ElevenLabs account');
      throw new Error(`${r.status} ${r.statusText}`);
    }
    const data = await r.json();
    elVoices = data.voices || [];
    localStorage.setItem('el_key', key);
    localStorage.setItem('el_voices', JSON.stringify(elVoices));
    renderElVoices('');
    setVoiceStatus(`${elVoices.length} voices loaded`, 'ok');
  } catch(e) {
    setVoiceStatus('failed: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'load voices';
  }
}

function filterVoices(btn) {
  document.querySelectorAll('.gpill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  elGenderFilter = btn.dataset.g;
  localStorage.setItem('el_gender', elGenderFilter);
  renderElVoices(document.getElementById('voice-select').value);
  saveVoiceChoice();
}

function renderElVoices(selectedId) {
  const genderRow  = document.getElementById('gender-row');
  const selectRow  = document.getElementById('voice-select-row');
  const sel        = document.getElementById('voice-select');
  if (!elVoices.length) { genderRow.style.display='none'; selectRow.style.display='none'; return; }

  genderRow.style.display = 'flex';
  selectRow.style.display = 'flex';

  const filtered = elGenderFilter === 'all'
    ? elVoices
    : elVoices.filter(v => (v.labels?.gender || '').toLowerCase() === elGenderFilter);

  sel.innerHTML = '<option value="">— browser TTS —</option>';
  filtered.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.voice_id;
    const gender = v.labels?.gender ? ` · ${v.labels.gender}` : '';
    const accent = v.labels?.accent ? ` · ${v.labels.accent}` : '';
    opt.textContent = `${v.name}${gender}${accent}`;
    if (v.voice_id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function saveVoiceChoice() {
  localStorage.setItem('el_voice_id', document.getElementById('voice-select').value);
}

function saveLangChoice() {
  localStorage.setItem('voice_lang', document.getElementById('lang-select').value);
  populateBrowserVoices();
}

// ── BROWSER TTS VOICES ──
let browserVoices = [];
function populateBrowserVoices() {
  const lang = localStorage.getItem('voice_lang') || 'en';
  browserVoices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith(lang));
  const sel = document.getElementById('browser-voice-select');
  if (!sel) return;
  const saved = localStorage.getItem('browser_voice');
  sel.innerHTML = '<option value="">— system default —</option>';
  browserVoices.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    if (v.name === saved) opt.selected = true;
    sel.appendChild(opt);
  });
}

function saveBrowserVoice() {
  localStorage.setItem('browser_voice', document.getElementById('browser-voice-select').value);
}

// ── START GENERATING → navigate to chat page ──
function startGenerating() {
  const ch = document.getElementById('channel-input').value.trim();
  if (!ch) { document.getElementById('channel-input').focus(); return; }
  // Flush all fields to localStorage before navigating
  localStorage.setItem('twitch_channel', ch);
  localStorage.setItem('twitch_handle', document.getElementById('handle-input').value.trim());
  localStorage.setItem('persona', document.getElementById('persona-input').value.trim());
  localStorage.setItem('context', document.getElementById('ctx-input').value.trim());
  localStorage.setItem('ignored_bots', document.getElementById('bots-input').value.trim());
  invalidateBotCache();
  const gameVal = document.getElementById('game-select').value;
  localStorage.setItem('game', gameVal);
  localStorage.setItem('game_custom', document.getElementById('game-custom-input').value.trim());
  window.location.href = 'chat.html';
}

// ── STATUS ──
function setStatus(cls, txt) {
  document.getElementById('status-dot').className = 'status-dot ' + cls;
  document.getElementById('status-label').textContent = txt;
}

// ── CONNECT ──
function toggleConnect() { isConnected ? disconnect() : connect(); }

function connect() {
  let ch = document.getElementById('channel-input').value.trim().toLowerCase();
  ch = ch.replace(/^(https?:\/\/)?(www\.)?twitch\.tv\//, '').replace(/^@/, '').replace(/\/.*$/, '').trim();
  if (!ch) return;
  setStatus('connecting', 'connecting…');
  const btn = document.getElementById('connect-btn');
  btn.textContent = '…';

  if (ws) { ws.onclose = null; ws.close(); ws = null; }

  const sock = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws = sock;
  ws.onopen = () => {
    if (ws !== sock) return;
    sock.send('PASS oauth:justinfan12345');
    sock.send('NICK justinfan12345');
    sock.send('JOIN #' + ch);
  };
  ws.onmessage = (e) => {
    const raw = e.data.trim();
    if (raw.includes('PING')) { if (sock.readyState === 1) sock.send('PONG :tmi.twitch.tv'); return; }
    if (raw.includes('366')) {
      isConnected = true;
      setStatus('connected', '#' + ch);
      btn.textContent = 'leave'; btn.className = 'btn-connect off';
      clearEmptyMsg();
    }
    const msg = parseIrcMsg(raw);
    if (msg) addMsg(msg.user, msg.text, msg.emotesTag);
  };
  ws.onerror = () => {
    setStatus('error', 'error'); btn.textContent = 'retry'; btn.className = 'btn-connect'; isConnected = false;
  };
  ws.onclose = () => {
    if (!isConnected) return;
    setStatus('error', 'disconnected'); isConnected = false;
    btn.textContent = 'connect'; btn.className = 'btn-connect';
  };
}

function disconnect() {
  if (ws) ws.close();
  isConnected = false; setStatus('', 'not connected');
  const btn = document.getElementById('connect-btn');
  btn.textContent = 'connect'; btn.className = 'btn-connect';
}

// ── CHAT ──
function clearEmptyMsg() {
  const e = document.getElementById('empty-msg'); if (e) e.remove();
}

function addMsg(user, rawText, emotesTag) {
  const llmText = replaceEmotes(rawText, emotesTag);
  const excluded = isExcluded(user, rawText);
  chatLog.push({ user, text: llmText, excluded });
  if (chatLog.length > MAX_MSG) chatLog.shift();

  const cols = ['#7c6aff','#ff6a9b','#4ade80','#fb923c','#60a5fa','#e879f9'];
  const col = cols[user.charCodeAt(0) % cols.length];

  const ca = document.getElementById('chat-area');
  ca.insertAdjacentHTML('beforeend',
    `<div class="chat-msg${excluded ? ' excluded' : ''}"><span class="chat-user" style="color:${col}">${x(user)}</span><span class="chat-text">${renderEmotes(rawText, emotesTag)}</span></div>`);
  ca.scrollTop = ca.scrollHeight;
}

// ── GENERATE (compact view) ──
async function gen() {
  const chat = chatLog.filter(m => !m.excluded).slice(-15).map(m => `${m.user}: ${m.text}`).join('\n');
  if (!chat) { alert('No chat messages yet'); return; }

  const persona = document.getElementById('persona-input').value.trim() || 'a streamer';
  let handle = document.getElementById('handle-input').value.trim().toLowerCase();
  handle = handle.replace(/^(https?:\/\/)?(www\.)?twitch\.tv\//, '').replace(/^@/, '').replace(/\/.*$/, '').trim();
  const ctx = document.getElementById('ctx-input').value.trim();
  const verbosity = localStorage.getItem('verbosity') || 'short';

  document.getElementById('responses-area').innerHTML = `<div class="loader"><div class="spinner"></div>generating…</div>`;
  document.getElementById('gen-btn').disabled = true;

  const langCode = localStorage.getItem('voice_lang') || 'en';
  const langNames = { en:'English', fr:'French', de:'German', es:'Spanish', it:'Italian', pt:'Portuguese', nl:'Dutch', ja:'Japanese', ko:'Korean', zh:'Chinese' };
  const langName = langNames[langCode] || langCode;
  const langInstruction = `Language: Respond in ${langName}. You may naturally incorporate words or short phrases borrowed from other languages where they appear in the chat and suit the streamer's voice.`;

  const prompt = `You generate spoken responses for ${persona}, a Twitch streamer who uses AAC (Augmentative and Alternative Communication). Output will be spoken aloud — no markdown, no asterisks, plain natural speech only. [emote] in chat marks a Twitch visual emote — do not say it aloud.

${langInstruction}

Length rule: ${VLENGTH[verbosity]}

Generate exactly 4 options varying in tone: one warm/engaged, one witty/playful, one direct, one bonus of whatever tone fits best.
Reply ONLY with valid JSON, no other text: {"responses":["...","...","...","..."]}

Recent chat:
${chat}${handle ? '\nThe streamer\'s own Twitch handle is @'+handle+'. If chat messages mention or address them by name, treat this as directly relevant.' : ''}${ctx ? '\nContext: '+ctx : ''}`;

  try {
    const r = await fetch(`${PROXY_URL}/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const d = await r.json();
    if (d.error) throw new Error(d.error.message ?? JSON.stringify(d.error));

    const raw = d.content?.[0]?.text ?? '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON found in response');
    renderCards(JSON.parse(jsonMatch[0]).responses);
  } catch(e) {
    document.getElementById('responses-area').innerHTML = `<div class="loader" style="color:var(--accent2)">Error: ${x(e.message)}</div>`;
  } finally {
    document.getElementById('gen-btn').disabled = false;
  }
}

// ── RENDER COMPACT ──
function renderCards(responses) {
  const area = document.getElementById('responses-area');
  area.innerHTML = '';
  responses.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'response-card';
    card.innerHTML = `<div class="rnum">${i+1}</div><div class="rtext">${x(text)}</div>
      <div class="card-btns"><button class="btn-speak">🔊</button><button class="btn-stop">■</button></div>`;
    card.querySelector('.btn-speak').onclick = () => speak(text, card);
    card.querySelector('.btn-stop').onclick = () => stopSpeak();
    area.appendChild(card);
  });
}

// ── SPEECH ──
function speak(text, card) {
  stopSpeak();
  speakingCard = card;
  card.classList.add('speaking');

  const voiceId = localStorage.getItem('el_voice_id') || '';
  const elKey = localStorage.getItem('el_key') || '';

  if (elKey && voiceId) {
    speakElevenLabs(text, elKey, voiceId, card, msg => setVoiceStatus('error: ' + msg, 'err'));
  } else {
    speakBrowser(text, card);
  }
}
</script>
</body>
</html>
