<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StreamAAC · Chat</title>
<link rel="stylesheet" href="styles.css">
<script src="chat-core.js" defer></script>
<script src="sample-phrases.js"></script>
</head>
<body>

<div id="fs-view" class="active">

  <div id="fs-topbar">
    <button class="btn-back" onclick="goBack()">← back</button>
    <div id="fs-status-dot"></div>
    <div id="fs-status-label">connecting…</div>
    <div class="fs-verbosity" style="margin-left:12px">
      <label style="font-size:14px;color:var(--muted);margin-right:2px">length</label>
      <button class="pill active" data-fv="short" onclick="setFV(this)">short</button>
      <button class="pill" data-fv="medium" onclick="setFV(this)">1 sentence</button>
      <button class="pill" data-fv="long" onclick="setFV(this)">longer</button>
    </div>
    <div class="fs-font-size-ctrl">
      <button id="fs-font-down" title="Decrease font size">A<sup>−</sup></button>
      <button id="fs-font-up" title="Increase font size">A<sup>+</sup></button>
    </div>
    <button class="btn-exit-fs" id="fs-phrases-btn" onclick="togglePhrasesView()">phrases</button>
    <button class="btn-exit-fs" id="fs-theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode">☀</button>
  </div>

  <div id="fs-body">
    <div id="fs-main">
      <div id="fs-responses">
        <div id="fs-empty-state">
          <button id="fs-suggest-prominent" onclick="gen()">suggest</button>
          <div class="fs-empty-hint">hit suggest to generate responses</div>
        </div>
      </div>
      <div id="phrases-main">
        <div id="phrases-header">
          <span>phrases</span>
          <div style="display:flex;gap:8px">
            <button class="phrases-icon-btn" onclick="renderPhrasesGrid()" title="Refresh">↻</button>
            <button class="phrases-icon-btn" id="phrases-edit-btn" onclick="togglePhraseEditor()" title="Manage phrases">✎</button>
          </div>
        </div>
        <div id="phrases-grid"></div>
        <div id="phrases-tag-view">
          <div id="phrases-tag-header">
            <button class="phrases-icon-btn" onclick="closeTagView()">← back</button>
            <span id="phrases-tag-name"></span>
            <span id="phrases-tag-page-info"></span>
          </div>
          <div id="phrases-tag-grid"></div>
        </div>
        <div id="phrases-editor">
          <div id="phrases-editor-header">
            <span>manage phrases</span>
          </div>
          <div id="phrases-add-form">
            <datalist id="phrase-tag-datalist"></datalist>
            <input type="text" id="phrase-tag-input" placeholder="tag" list="phrase-tag-datalist" autocomplete="off">
            <input type="text" id="phrase-label-input" placeholder="label (optional)" autocomplete="off">
            <input type="text" id="phrase-phrase-input" placeholder="phrase text…" autocomplete="off">
            <button onclick="addPhrase()">+ add</button>
          </div>
          <div id="phrases-io-bar">
            <button onclick="exportPhrases()">↓ export .txt</button>
            <input type="file" id="phrases-import-input" accept=".txt" style="display:none" onchange="importPhrases(event)">
            <button onclick="document.getElementById('phrases-import-input').click()">↑ import .txt</button>
          </div>
          <div id="phrases-list"></div>
        </div>
      </div>
      <div id="fs-custom-bar">
        <button id="fs-magic-btn" title="Generate suggestions from keywords" onclick="genFromKeywords()" disabled>🪄</button>
        <input type="text" id="fs-custom-input" placeholder="type keywords or exact phrase…" autocomplete="off">
        <button id="fs-custom-clear" aria-label="Clear">✕</button>
        <button id="fs-custom-speak-btn" title="Speak this text" onclick="speakCustomText()">🔊</button>
        <button id="fs-custom-stop-btn" title="Stop speaking" onclick="stopSpeak()">■</button>
      </div>
    </div>
    <div id="fs-chat-panel">
      <div id="fs-chat-header">
        <span>chat · tap to select</span>
        <button class="btn-close-chat" onclick="closeFsChat()" aria-label="Close chat panel">‹</button>
      </div>
      <div id="fs-chat-area">
        <div class="empty-state" style="padding:20px 6px">connecting…</div>
      </div>
      <button id="fs-new-msgs-btn" onclick="acceptNewMessages()">
        ↓ <span id="fs-new-msgs-count"></span> new messages
      </button>
      <button id="fs-suggest-btn" class="btn-gen" onclick="gen()">suggest</button>
    </div>
    <button id="fs-open-chat" onclick="openFsChat()" aria-label="Open chat panel">chat ›</button>
  </div>

</div>

<script>
// ── STATE ──
let ws = null, chatLog = [], isConnected = false, everConnected = false;
let currentChannel = '';
let reconnectTimer = null;
let verbosity = 'short';
let selectedMsg = null;
let fsFontSize = parseInt(localStorage.getItem('fsFontSize') || '17');
let theme = localStorage.getItem('theme') || 'dark';
let bufferedFsMsgs = [];
const MAX_MSG = 40;

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  applyFsFontSize();

  // Restore verbosity
  const savedV = localStorage.getItem('verbosity') || 'short';
  verbosity = savedV;
  document.querySelectorAll('.pill[data-fv]').forEach(p =>
    p.classList.toggle('active', p.dataset.fv === savedV));

  // Font size buttons
  document.getElementById('fs-font-down').onclick = () => {
    if (fsFontSize > 10) { fsFontSize = Math.max(10, fsFontSize - 2); applyFsFontSize(); localStorage.setItem('fsFontSize', fsFontSize); }
  };
  document.getElementById('fs-font-up').onclick = () => {
    if (fsFontSize < 28) { fsFontSize = Math.min(28, fsFontSize + 2); applyFsFontSize(); localStorage.setItem('fsFontSize', fsFontSize); }
  };

  // Auto-connect
  const ch = localStorage.getItem('twitch_channel');
  if (ch) connect(ch);

  initClearBtn(document.getElementById('fs-custom-input'), document.getElementById('fs-custom-clear'));
  seedPhrasesIfEmpty();
});

// ── THEME ──
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('fs-theme-btn').textContent = theme === 'dark' ? '☀' : '☾';
}

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('theme', theme);
  document.getElementById('fs-theme-btn').textContent = theme === 'dark' ? '☀' : '☾';
}

// ── FONT SIZE ──
function applyFsFontSize() {
  document.getElementById('fs-view').style.setProperty('--fs-font-size', fsFontSize + 'px');
}

// ── VERBOSITY ──
function setFV(btn) {
  document.querySelectorAll('.pill[data-fv]').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  verbosity = btn.dataset.fv;
  localStorage.setItem('verbosity', verbosity);
}

// ── NAVIGATION ──
function goBack() {
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  window.location.href = 'index.html';
}

// ── STATUS ──
function setStatus(cls, txt) {
  document.getElementById('fs-status-dot').className = 'status-dot ' + cls;
  document.getElementById('fs-status-label').textContent = txt;
}

// ── SUGGEST BUTTONS ──
function setFsSuggestEnabled(enabled) {
  document.getElementById('fs-suggest-btn').disabled = !enabled;
  document.getElementById('fs-magic-btn').disabled = !enabled;
  const prominent = document.getElementById('fs-suggest-prominent');
  if (prominent) prominent.disabled = !enabled;
}

// ── CONNECT ──
function connect(rawCh) {
  let ch = rawCh.trim().toLowerCase();
  ch = ch.replace(/^(https?:\/\/)?(www\.)?twitch\.tv\//, '').replace(/^@/, '').replace(/\/.*$/, '').trim();
  if (!ch) return;
  currentChannel = ch;
  clearTimeout(reconnectTimer);

  function handleConnectFailure(ch) {
    alert(`Could not connect to Twitch chat for "${ch}".\nCheck the channel name and try again.`);
    window.location.href = 'index.html';
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    setStatus('connecting', 'reconnecting…');
    reconnectTimer = setTimeout(() => connect(currentChannel), 4000);
  }

  setStatus('connecting', 'connecting…');

  if (ws) { ws.onclose = null; ws.close(); ws = null; }

  const sock = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws = sock;
  ws.onopen = () => {
    if (ws !== sock) return;
    sock.send('PASS oauth:justinfan12345');
    sock.send('NICK justinfan12345');
    sock.send('JOIN #' + ch);
  };
  ws.onmessage = (e) => {
    const raw = e.data.trim();
    if (raw.includes('PING')) { if (sock.readyState === 1) sock.send('PONG :tmi.twitch.tv'); return; }
    if (raw.includes('366')) {
      const wasReconnect = everConnected && !isConnected;
      isConnected = true;
      everConnected = true;
      setStatus('connected', '#' + ch);
      setFsSuggestEnabled(true);
      clearEmptyMsg();
      if (wasReconnect) addChatDivider('— reconnected —');
    }
    const msg = parseIrcMsg(raw);
    if (msg) addMsg(msg.user, msg.text, msg.emotesTag);
  };
  ws.onerror = () => {
    isConnected = false;
    if (!everConnected) {
      setStatus('error', 'connection error');
      // onclose will fire next and handle the alert
    }
  };
  ws.onclose = () => {
    if (ws !== sock) return;
    isConnected = false;
    setFsSuggestEnabled(false);
    if (everConnected) {
      addChatDivider('— temporarily disconnected —');
      scheduleReconnect();
    } else {
      handleConnectFailure(ch);
    }
  };
}

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && !isConnected && everConnected) {
    clearTimeout(reconnectTimer);
    connect(currentChannel);
  }
});

// ── CHAT DIVIDER ──
function addChatDivider(text) {
  const fca = document.getElementById('fs-chat-area');
  if (!fca) return;
  const el = document.createElement('div');
  el.className = 'fs-chat-divider';
  el.textContent = text;
  fca.appendChild(el);
  fca.scrollTop = fca.scrollHeight;
}

// ── CHAT ──
function clearEmptyMsg() {
  const fe = document.querySelector('#fs-chat-area .empty-state');
  if (fe) fe.remove();
}

function addMsg(user, rawText, emotesTag) {
  const llmText = replaceEmotes(rawText, emotesTag);
  const excluded = isExcluded(user, rawText);
  const entry = { user, text: llmText, excluded };
  chatLog.push(entry);
  if (chatLog.length > MAX_MSG) chatLog.shift();

  const cols = ['#7c6aff','#ff6a9b','#4ade80','#fb923c','#60a5fa','#e879f9'];
  const col = cols[user.charCodeAt(0) % cols.length];

  const fsEl = document.createElement('div');
  fsEl.className = 'fs-chat-msg' + (excluded ? ' excluded' : '');
  fsEl.innerHTML = `<span class="chat-user" style="color:${col}">${x(user)}</span><span class="chat-text">${renderEmotes(rawText, emotesTag)}</span>`;
  fsEl.addEventListener('click', () => {
    if (selectedMsg === entry) {
      clearSelection();
      flushBufferedFsMsgs();
    } else {
      clearSelection();
      selectedMsg = entry;
      fsEl.classList.add('selected');
      const lbl = document.createElement('span');
      lbl.className = 'fs-selected-label';
      lbl.textContent = '▶ responding to';
      fsEl.prepend(lbl);
    }
  });

  if (selectedMsg) {
    bufferedFsMsgs.push(fsEl);
    const btn = document.getElementById('fs-new-msgs-btn');
    btn.style.display = 'block';
    document.getElementById('fs-new-msgs-count').textContent = bufferedFsMsgs.length;
  } else {
    const fca = document.getElementById('fs-chat-area');
    fca.appendChild(fsEl);
    fca.scrollTop = fca.scrollHeight;
  }
}

function clearSelection() {
  selectedMsg = null;
  document.querySelectorAll('.fs-chat-msg.selected').forEach(el => {
    el.classList.remove('selected');
    const lbl = el.querySelector('.fs-selected-label');
    if (lbl) lbl.remove();
  });
}

function flushBufferedFsMsgs() {
  const fca = document.getElementById('fs-chat-area');
  bufferedFsMsgs.forEach(el => fca.appendChild(el));
  bufferedFsMsgs = [];
  fca.scrollTop = fca.scrollHeight;
  document.getElementById('fs-new-msgs-btn').style.display = 'none';
}

function acceptNewMessages() {
  clearSelection();
  flushBufferedFsMsgs();
}

function closeFsChat() {
  document.getElementById('fs-chat-panel').classList.add('closed');
  document.getElementById('fs-open-chat').classList.add('visible');
}
function openFsChat() {
  document.getElementById('fs-chat-panel').classList.remove('closed');
  document.getElementById('fs-open-chat').classList.remove('visible');
}

// ── GENERATE ──
async function gen() {
  const chat = chatLog.filter(m => !m.excluded).slice(-15).map(m => `${m.user}: ${m.text}`).join('\n') || '(no chat messages yet — streamer just went live)';

  const persona    = localStorage.getItem('persona') || 'a streamer';
  let handle       = (localStorage.getItem('twitch_handle') || '').trim().toLowerCase();
  handle = handle.replace(/^(https?:\/\/)?(www\.)?twitch\.tv\//, '').replace(/^@/, '').replace(/\/.*$/, '').trim();
  const ctx        = localStorage.getItem('context') || '';
  const game       = localStorage.getItem('game') || '';
  const gameCustom = localStorage.getItem('game_custom') || '';
  const gameStr    = game === 'other' ? gameCustom : game;

  const selectedContext = selectedMsg
    ? `\n\nThe streamer has selected this specific message to respond to — prioritize crafting responses that directly address it: "${selectedMsg.user}: ${selectedMsg.text}"`
    : '';

  document.getElementById('fs-responses').innerHTML =
    `<div class="fs-loader"><div class="spinner"></div>generating…</div>`;
  setFsSuggestEnabled(false);

  const langCode = localStorage.getItem('voice_lang') || 'en';
  const langNames = { en:'English', fr:'French', de:'German', es:'Spanish', it:'Italian', pt:'Portuguese', nl:'Dutch', ja:'Japanese', ko:'Korean', zh:'Chinese' };
  const langName = langNames[langCode] || langCode;
  const langInstruction = `Language: Respond in ${langName}. You may naturally incorporate words or short phrases borrowed from other languages where they appear in the chat and suit the streamer's voice.`;

  const prompt = `You generate spoken responses for ${persona}, a Twitch streamer who uses AAC (Augmentative and Alternative Communication). Output will be spoken aloud — no markdown, no asterisks, plain natural speech only. [emote] in chat marks a Twitch visual emote — do not say it aloud.

${langInstruction}

Length rule: ${VLENGTH[verbosity]}

Generate exactly 4 options varying in tone: one warm/engaged, one witty/playful, one direct, one bonus of whatever tone fits best.
Reply ONLY with valid JSON, no other text: {"responses":["...","...","...","..."]}

Recent chat:
${chat}${handle ? '\nThe streamer\'s own Twitch handle is @'+handle+'. If chat messages mention or address them by name, treat this as directly relevant.' : ''}${ctx ? '\nContext: '+ctx : ''}${gameStr ? '\nGame: The streamer is playing '+gameStr+'.' : ''}${selectedContext}`;

  try {
    const r = await fetch(`${PROXY_URL}/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const d = await r.json();
    if (d.error) throw new Error(d.error.message ?? JSON.stringify(d.error));

    const raw = d.content?.[0]?.text ?? '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON found in response');
    renderFsCards(JSON.parse(jsonMatch[0]).responses);
  } catch(e) {
    document.getElementById('fs-responses').innerHTML =
      `<div class="fs-loader" style="color:var(--accent2)">Error: ${x(e.message)}</div>`;
  } finally {
    setFsSuggestEnabled(true);
  }
}

// ── RENDER ──
function renderFsCards(responses) {
  const area = document.getElementById('fs-responses');
  area.innerHTML = '';
  responses.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'fs-card';
    card.innerHTML = `<div class="fs-rnum">${i+1}</div><div class="fs-rtext">${x(text)}</div>
      <div class="fs-card-btns"><button class="fs-speak">🔊</button><button class="fs-stop">■</button></div>`;
    card.querySelector('.fs-speak').onclick = () => speak(text, card);
    card.querySelector('.fs-stop').onclick  = () => stopSpeak();
    area.appendChild(card);
  });
}

// ── SPEECH ──
function speak(text, card) {
  stopSpeak();
  clearSelection();
  flushBufferedFsMsgs();
  speakingCard = card;
  if (card) card.classList.add('speaking');

  const voiceId = localStorage.getItem('el_voice_id') || '';
  const elKey   = localStorage.getItem('el_key') || '';

  if (elKey && voiceId) {
    speakElevenLabs(text, elKey, voiceId, card);
  } else {
    speakBrowser(text, card);
  }
}

// ── SPEAK CUSTOM TEXT ──
function speakCustomText() {
  const text = document.getElementById('fs-custom-input').value.trim();
  if (!text) return;
  speak(text, document.getElementById('fs-custom-bar'));
}

// ── PHRASES STATE ──
let phrasesViewActive = false;
let phrasesTagPage = 0;
let tagViewTag = null;
let tagViewPage = 0;
let suggestedPhraseIds = null; // null = loading, [] = empty, [ids] = results
let phraseEditorOpen = false;
let phrasesSuggestToken = 0;

// ── PHRASES DATA LAYER ──
function seedPhrasesIfEmpty() {
  if (localStorage.getItem('stored_phrases') !== null) return;
  savePhrases((typeof SAMPLE_PHRASES !== 'undefined' ? SAMPLE_PHRASES : [])
    .map(p => ({ id: generateId(), ...p })));
}

function loadPhrases() {
  try { return JSON.parse(localStorage.getItem('stored_phrases') || '[]'); }
  catch(_) { return []; }
}

function savePhrases(arr) {
  localStorage.setItem('stored_phrases', JSON.stringify(arr));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function getPhraseTags(phrases) {
  const seen = new Set(), tags = [];
  for (const p of phrases) {
    const t = p.tag || 'misc';
    if (!seen.has(t)) { seen.add(t); tags.push(t); }
  }
  return tags;
}

// ── PHRASES VIEW TOGGLE ──
function togglePhrasesView() {
  phrasesViewActive = !phrasesViewActive;
  document.getElementById('fs-phrases-btn').classList.toggle('active', phrasesViewActive);
  document.getElementById('fs-responses').style.display = phrasesViewActive ? 'none' : '';
  document.getElementById('fs-custom-bar').style.display = phrasesViewActive ? 'none' : '';
  document.getElementById('phrases-main').style.display = phrasesViewActive ? 'flex' : 'none';
  if (phrasesViewActive) {
    suggestedPhraseIds = null;
    phraseEditorOpen = false;
    phrasesTagPage = 0;
    showPhrasesPanel('grid');
    renderPhrasesGrid();
    loadSuggestedPhrases();
  }
}

function showPhrasesPanel(which) {
  document.getElementById('phrases-grid').style.display = which === 'grid' ? 'grid' : 'none';
  document.getElementById('phrases-tag-view').style.display = which === 'tag' ? 'flex' : 'none';
  document.getElementById('phrases-editor').style.display = which === 'editor' ? 'flex' : 'none';
  document.getElementById('phrases-edit-btn').classList.toggle('active', which === 'editor');
}

// ── PHRASES GRID ──
function makeRowLabel(text, row, rowSpan) {
  const el = document.createElement('div');
  el.className = 'phrase-row-label';
  el.textContent = text;
  el.style.gridColumn = '1';
  el.style.gridRow = rowSpan > 1 ? `${row} / span ${rowSpan}` : String(row);
  return el;
}

function renderPhrasesGrid() {
  const grid = document.getElementById('phrases-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const phrases = loadPhrases();

  // Row 1: starred
  grid.appendChild(makeRowLabel('starred', 1));
  const starred = phrases.filter(p => p.starred);
  for (let i = 0; i < 4; i++) {
    const p = starred[i];
    if (p) {
      const ph = p.phrase;
      grid.appendChild(makePhraseCellEl(p.label || p.phrase, ['phrase-cell', 'starred'], ph));
    } else {
      grid.appendChild(makeEmptyCell());
    }
  }

  // Row 2: LLM suggested
  grid.appendChild(makeRowLabel('suggested', 2));
  for (let i = 0; i < 4; i++) {
    if (suggestedPhraseIds === null) {
      grid.appendChild(makeLoadingCell());
    } else {
      const id = suggestedPhraseIds[i];
      const p = id ? phrases.find(ph => ph.id === id) : null;
      if (p) {
        const ph = p.phrase;
        grid.appendChild(makePhraseCellEl(p.label || p.phrase, ['phrase-cell', 'suggested'], ph));
      } else {
        grid.appendChild(makeEmptyCell());
      }
    }
  }

  // Rows 3–4: tag buttons
  grid.appendChild(makeRowLabel('all phrases', 3, 2));
  const tags = getPhraseTags(phrases);
  if (tags.length === 0 && starred.length === 0) {
    // No phrases at all — show hint spanning rows 3–4
    const hint = document.createElement('div');
    hint.className = 'phrase-cell empty phrases-empty-hint';
    hint.style.cssText = 'grid-column:2/-1;grid-row:3/5;opacity:1;pointer-events:none;border-style:dashed;flex-direction:column;gap:6px';
    hint.innerHTML = '<span style="font-size:15px;color:var(--muted)">no phrases yet</span><span style="font-size:13px;color:var(--muted);opacity:0.7">add one with ✎</span>';
    grid.appendChild(hint);
  } else if (tags.length === 0) {
    for (let i = 0; i < 8; i++) grid.appendChild(makeEmptyCell());
  } else if (tags.length <= 8) {
    for (let i = 0; i < 8; i++) {
      grid.appendChild(i < tags.length ? makeTagCellEl(tags[i], phrases) : makeEmptyCell());
    }
  } else if (phrasesTagPage === 0) {
    tags.slice(0, 7).forEach(t => grid.appendChild(makeTagCellEl(t, phrases)));
    grid.appendChild(makeNavCell('›', () => { phrasesTagPage++; renderPhrasesGrid(); }));
  } else {
    const offset = 7 + (phrasesTagPage - 1) * 6;
    const hasNext = offset + 6 < tags.length;
    grid.appendChild(makeNavCell('‹', () => { phrasesTagPage--; renderPhrasesGrid(); }));
    const pageTags = tags.slice(offset, hasNext ? offset + 6 : tags.length);
    pageTags.forEach(t => grid.appendChild(makeTagCellEl(t, phrases)));
    for (let i = pageTags.length; i < (hasNext ? 6 : 7); i++) grid.appendChild(makeEmptyCell());
    if (hasNext) grid.appendChild(makeNavCell('›', () => { phrasesTagPage++; renderPhrasesGrid(); }));
  }
}

function makePhraseCellEl(label, classes, phraseText) {
  const el = document.createElement('div');
  el.className = [...classes, 'speakable'].join(' ');
  el.innerHTML = `<span class="pc-label">${x(label)}</span>
    <div class="pc-btns">
      <button class="pc-speak">🔊</button>
      <button class="pc-stop">■</button>
    </div>`;
  el.querySelector('.pc-speak').onclick = () => speak(phraseText, el);
  el.querySelector('.pc-stop').onclick  = () => stopSpeak();
  return el;
}

function makeEmptyCell() {
  const el = document.createElement('div');
  el.className = 'phrase-cell empty';
  return el;
}

function makeLoadingCell() {
  const el = document.createElement('div');
  el.className = 'phrase-cell loading';
  el.textContent = '…';
  return el;
}

function makeTagCellEl(tag, phrases) {
  const count = phrases.filter(p => (p.tag || 'misc') === tag).length;
  const el = document.createElement('button');
  el.className = 'phrase-cell tag-btn';
  el.innerHTML = `<span>${x(tag)}</span><span style="font-size:calc(var(--fs-font-size) - 3px);color:var(--muted)">(${count} phrase${count !== 1 ? 's' : ''})</span>`;
  el.onclick = () => openTagView(tag);
  return el;
}

function makeNavCell(symbol, onclick) {
  const el = document.createElement('button');
  el.className = 'phrase-cell next-page';
  el.textContent = symbol;
  el.onclick = onclick;
  return el;
}

// ── TAG SUB-VIEW ──
function openTagView(tag) {
  tagViewTag = tag;
  tagViewPage = 0;
  document.getElementById('phrases-tag-name').textContent = tag;
  showPhrasesPanel('tag');
  renderTagGrid();
}

function closeTagView() {
  tagViewTag = null;
  showPhrasesPanel('grid');
}

function renderTagGrid() {
  const grid = document.getElementById('phrases-tag-grid');
  grid.innerHTML = '';
  const phrases = loadPhrases()
    .filter(p => (p.tag || 'misc') === tagViewTag)
    .sort((a, b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0));

  const total = phrases.length;
  const pageSize = 14;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const page = phrases.slice(tagViewPage * pageSize, (tagViewPage + 1) * pageSize);

  document.getElementById('phrases-tag-page-info').textContent =
    totalPages > 1 ? `${tagViewPage + 1}/${totalPages}` : '';

  // Cell 0: back
  const back = document.createElement('button');
  back.className = 'phrase-cell tag-btn';
  back.textContent = '← back';
  back.onclick = closeTagView;
  grid.appendChild(back);

  // Cells 1–14: phrases
  for (let i = 0; i < 14; i++) {
    const p = page[i];
    if (p) {
      const ph = p.phrase;
      grid.appendChild(makePhraseCellEl(p.label || p.phrase,
        ['phrase-cell', p.starred ? 'starred' : ''].filter(Boolean),
        ph));
    } else {
      grid.appendChild(makeEmptyCell());
    }
  }

  // Cell 15: next/prev or empty
  if (totalPages > 1 && tagViewPage < totalPages - 1) {
    grid.appendChild(makeNavCell('›', () => { tagViewPage++; renderTagGrid(); }));
  } else if (tagViewPage > 0) {
    grid.appendChild(makeNavCell('‹', () => { tagViewPage--; renderTagGrid(); }));
  } else {
    grid.appendChild(makeEmptyCell());
  }
}

// ── LLM PHRASE SUGGESTIONS ──
async function loadSuggestedPhrases() {
  const token = ++phrasesSuggestToken;
  const phrases = loadPhrases();
  if (!phrases.length) {
    if (token === phrasesSuggestToken) { suggestedPhraseIds = []; renderPhrasesGrid(); }
    return;
  }
  const chat = chatLog.filter(m => !m.excluded).slice(-10)
    .map(m => `${m.user}: ${m.text}`).join('\n') || '(no recent chat)';
  const phraseList = phrases.map(p => `${p.id}|${p.tag || 'misc'}|${p.label || p.phrase}`).join('\n');
  const prompt = `You help a Twitch streamer using AAC pick contextually relevant pre-written phrases.

Recent chat:
${chat}

Available phrases (id|tag|label):
${phraseList}

Pick the 4 most contextually relevant phrase IDs. Return ONLY valid JSON: {"ids":["id1","id2","id3","id4"]}`;

  try {
    const r = await fetch(`${PROXY_URL}/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 256,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (token !== phrasesSuggestToken) return;
    const d = await r.json();
    const raw = d.content?.[0]?.text ?? '';
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) {
      const ids = JSON.parse(m[0]).ids || [];
      if (token === phrasesSuggestToken) { suggestedPhraseIds = ids.slice(0, 4); renderPhrasesGrid(); }
    }
  } catch(_) {
    if (token === phrasesSuggestToken) { suggestedPhraseIds = []; renderPhrasesGrid(); }
  }
}

// ── PHRASE EDITOR ──
function togglePhraseEditor() {
  if (phraseEditorOpen) {
    phraseEditorOpen = false;
    showPhrasesPanel('grid');
  } else {
    phraseEditorOpen = true;
    tagViewTag = null;
    showPhrasesPanel('editor');
    renderPhraseEditor();
    refreshTagDatalist();
  }
}

function renderPhraseEditor() {
  const list = document.getElementById('phrases-list');
  list.innerHTML = '';
  const phrases = loadPhrases();
  const tags = getPhraseTags(phrases);
  if (!phrases.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:12px 0">no phrases yet — add one above</div>';
    return;
  }
  tags.forEach(tag => {
    const group = phrases.filter(p => (p.tag || 'misc') === tag);
    const lbl = document.createElement('div');
    lbl.className = 'phrase-group-label';
    lbl.textContent = `${tag} (${group.length} phrase${group.length !== 1 ? 's' : ''})`;
    list.appendChild(lbl);
    group.forEach(p => {
      const row = document.createElement('div');
      row.className = 'phrase-row';
      row.innerHTML = `
        <input class="pr-tag" value="${x(p.tag || 'misc')}" list="phrase-tag-datalist"
          onchange="updatePhraseField('${p.id}','tag',this.value)" autocomplete="off">
        <input class="pr-label" value="${x(p.label || '')}" placeholder="label"
          onchange="updatePhraseField('${p.id}','label',this.value)" autocomplete="off">
        <input class="pr-phrase" value="${x(p.phrase)}" placeholder="phrase"
          onchange="updatePhraseField('${p.id}','phrase',this.value)" autocomplete="off">
        <button class="pr-star${p.starred ? ' starred' : ''}" onclick="togglePhraseStar('${p.id}')" title="Star">★</button>
        <button class="pr-del" onclick="deletePhrase('${p.id}')" title="Delete">✕</button>`;
      list.appendChild(row);
    });
  });
}

function addPhrase() {
  const tagIn = document.getElementById('phrase-tag-input').value.trim() || 'misc';
  const labelIn = document.getElementById('phrase-label-input').value.trim();
  const phraseIn = document.getElementById('phrase-phrase-input').value.trim();
  if (!phraseIn) return;
  const phrases = loadPhrases();
  phrases.push({ id: generateId(), tag: tagIn, label: labelIn || phraseIn, phrase: phraseIn, starred: false });
  savePhrases(phrases);
  document.getElementById('phrase-tag-input').value = '';
  document.getElementById('phrase-label-input').value = '';
  document.getElementById('phrase-phrase-input').value = '';
  renderPhraseEditor();
  refreshTagDatalist();
  if (!phraseEditorOpen) renderPhrasesGrid();
}

function updatePhraseField(id, field, value) {
  const phrases = loadPhrases();
  const p = phrases.find(ph => ph.id === id);
  if (!p) return;
  if (field === 'tag') p.tag = value.trim() || 'misc';
  else if (field === 'label') p.label = value.trim();
  else if (field === 'phrase') p.phrase = value.trim();
  savePhrases(phrases);
  if (field === 'tag') { renderPhraseEditor(); refreshTagDatalist(); }
}

function togglePhraseStar(id) {
  const phrases = loadPhrases();
  const p = phrases.find(ph => ph.id === id);
  if (!p) return;
  p.starred = !p.starred;
  savePhrases(phrases);
  renderPhraseEditor();
  renderPhrasesGrid();
}

function deletePhrase(id) {
  const phrases = loadPhrases().filter(p => p.id !== id);
  savePhrases(phrases);
  renderPhraseEditor();
  renderPhrasesGrid();
}

function refreshTagDatalist() {
  const dl = document.getElementById('phrase-tag-datalist');
  if (!dl) return;
  dl.innerHTML = '';
  getPhraseTags(loadPhrases()).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    dl.appendChild(opt);
  });
}

// ── PHRASES EXPORT / IMPORT ──
function formatPhrasesTxt(phrases) {
  const today = new Date().toISOString().slice(0, 10);
  let out = `# StreamAAC phrases — exported ${today}\n# Format: [tag], then  * label | phrase  (* = favourite)\n\n`;
  const tags = getPhraseTags(phrases);
  tags.forEach(tag => {
    out += `[${tag}]\n`;
    phrases.filter(p => (p.tag || 'misc') === tag).forEach(p => {
      out += `${p.starred ? '* ' : ''}${p.label || p.phrase} | ${p.phrase}\n`;
    });
    out += '\n';
  });
  return out.trimEnd();
}

function exportPhrases() {
  const phrases = loadPhrases();
  if (!phrases.length) { alert('No phrases to export.'); return; }
  const txt = formatPhrasesTxt(phrases);
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const today = new Date().toISOString().slice(0, 10);
  a.download = `streamaac-phrases-${today}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function parsePhrasesTxt(text) {
  const parsed = [];
  let currentTag = 'misc';
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line || line.startsWith('#')) continue;
    const tagMatch = line.match(/^\[(.+)\]$/);
    if (tagMatch) { currentTag = tagMatch[1].trim() || 'misc'; continue; }
    const starred = line.startsWith('* ');
    const content = starred ? line.slice(2).trim() : line;
    const sep = content.includes(' | ') ? ' | ' : '|';
    const idx = content.indexOf(sep);
    let label, phrase;
    if (idx !== -1) {
      label = content.slice(0, idx).trim();
      phrase = content.slice(idx + sep.length).trim();
    } else {
      label = content;
      phrase = content;
    }
    if (phrase) parsed.push({ tag: currentTag, label: label || phrase, phrase, starred });
  }
  return parsed;
}

function importPhrases(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const incoming = parsePhrasesTxt(e.target.result);
    const existing = loadPhrases();
    const existingPhrases = new Set(existing.map(p => p.phrase));
    let added = 0;
    incoming.forEach(p => {
      if (!existingPhrases.has(p.phrase)) {
        existing.push({ id: generateId(), ...p });
        existingPhrases.add(p.phrase);
        added++;
      }
    });
    savePhrases(existing);
    renderPhraseEditor();
    refreshTagDatalist();
    renderPhrasesGrid();
    alert(`Imported ${added} phrase${added !== 1 ? 's' : ''} (${incoming.length - added} duplicate${incoming.length - added !== 1 ? 's' : ''} skipped).`);
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── GENERATE FROM KEYWORDS ──
async function genFromKeywords() {
  const keywords = document.getElementById('fs-custom-input').value.trim();
  if (!keywords) return;

  const chat = chatLog.filter(m => !m.excluded).slice(-15).map(m => `${m.user}: ${m.text}`).join('\n') || '(no chat messages yet)';

  const persona    = localStorage.getItem('persona') || 'a streamer';
  let handle       = (localStorage.getItem('twitch_handle') || '').trim().toLowerCase();
  handle = handle.replace(/^(https?:\/\/)?(www\.)?twitch\.tv\//, '').replace(/^@/, '').replace(/\/.*$/, '').trim();
  const ctx        = localStorage.getItem('context') || '';
  const game       = localStorage.getItem('game') || '';
  const gameCustom = localStorage.getItem('game_custom') || '';
  const gameStr    = game === 'other' ? gameCustom : game;

  document.getElementById('fs-responses').innerHTML =
    `<div class="fs-loader"><div class="spinner"></div>generating…</div>`;
  setFsSuggestEnabled(false);

  const langCode = localStorage.getItem('voice_lang') || 'en';
  const langNames = { en:'English', fr:'French', de:'German', es:'Spanish', it:'Italian', pt:'Portuguese', nl:'Dutch', ja:'Japanese', ko:'Korean', zh:'Chinese' };
  const langName = langNames[langCode] || langCode;
  const langInstruction = `Language: Respond in ${langName}.`;

  const prompt = `You generate spoken responses for ${persona}, a Twitch streamer who uses AAC (Augmentative and Alternative Communication). Output will be spoken aloud — no markdown, no asterisks, plain natural speech only.

${langInstruction}

Length rule: ${VLENGTH[verbosity]}

The streamer has typed these keywords or a rough phrase they want to express: "${keywords}"
Use this as your primary guide. Expand or rephrase into 4 natural spoken AAC responses that capture this intent, varying in tone: one warm/engaged, one witty/playful, one direct, one bonus of whatever tone fits best.
Reply ONLY with valid JSON, no other text: {"responses":["...","...","...","..."]}

Recent chat (for context):
${chat}${handle ? '\nStreamer handle: @'+handle : ''}${ctx ? '\nContext: '+ctx : ''}${gameStr ? '\nGame: '+gameStr : ''}`;

  try {
    const r = await fetch(`${PROXY_URL}/v1/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const d = await r.json();
    if (d.error) throw new Error(d.error.message ?? JSON.stringify(d.error));

    const raw = d.content?.[0]?.text ?? '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON found in response');
    renderFsCards(JSON.parse(jsonMatch[0]).responses);
  } catch(e) {
    document.getElementById('fs-responses').innerHTML =
      `<div class="fs-loader" style="color:var(--accent2)">Error: ${x(e.message)}</div>`;
  } finally {
    setFsSuggestEnabled(true);
  }
}
